<!DOCTYPE html>
<html lang='ja'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>LEAP 単語帳 - 完全統合版</title>
  <link href='https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&family=Bebas+Neue&display=swap' rel='stylesheet'>
  <style>
    :root { --bg: #07080f; --s1: #0f1018; --s2: #171825; --s3: #1e2030; --accent: #5b8dee; --green: #3ecf8e; --red: #f06570; --text: #e2e4f0; --muted: #5a5e80; --border: #22243a; --r: 14px; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--s1); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 6px; color: var(--accent); }
    .logo em { color: var(--text); font-style: normal; }
    .hstats { display: flex; gap: 20px; }
    .hstat { text-align: center; font-size: .7rem; color: var(--muted); }
    .hstat strong { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--text); }
    .tabs { display: flex; background: var(--s1); border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-size: .85rem; color: var(--muted); border-bottom: 2px solid transparent; transition: all .2s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(91, 141, 238, .06); }
    main { flex: 1; max-width: 740px; width: 100%; margin: 0 auto; padding: 24px 16px; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .tbinput { background: var(--s2); border: 1px solid var(--border); color: var(--text); padding: 7px 11px; border-radius: 8px; width: 65px; }
    .btn-go { background: var(--accent); color: #fff; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: 700; border: none; }
    .tbbtn { background: var(--s2); border: 1px solid var(--border); color: var(--muted); padding: 7px 14px; border-radius: 8px; cursor: pointer; }
    .pgwrap { margin-bottom: 18px; }
    .pginfo { display: flex; justify-content: space-between; font-size: .75rem; color: var(--muted); margin-bottom: 5px; }
    .pgbar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .pgfill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width .4s; }
    .card-scene { perspective: 1200px; cursor: pointer; margin-bottom: 20px; user-select: none; }
    .card-inner { position: relative; width: 100%; min-height: 280px; transform-style: preserve-3d; transition: transform .4s; }
    .card-inner.flip { transform: rotateY(180deg); }
    .face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: var(--r); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; border: 1px solid var(--border); }
    .face-front { background: var(--s1); }
    .face-back { background: var(--s2); border-color: var(--accent); transform: rotateY(180deg); }
    .face-word { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; color: var(--text); }
    .face-eng { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); }
    .btnrow { display: flex; gap: 8px; margin-bottom: 10px; }
    .btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--s2); color: var(--text); cursor: pointer; font-weight: bold; }
    .btn-ok { border-color: var(--green); color: var(--green); }
    .btn-ng { border-color: var(--red); color: var(--red); }
    .qcard { background: var(--s1); border: 1px solid var(--border); border-radius: var(--r); padding: 40px 20px; text-align: center; margin-bottom: 20px; }
    .qword { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--text); }
    .opts { display: flex; flex-direction: column; gap: 10px; }
    .opt { background: var(--s2); border: 1px solid var(--border); padding: 15px; border-radius: 10px; cursor: pointer; text-align: left; }
    .opt.correct { background: var(--green) !important; color: #000; font-weight: bold; }
    .opt.wrong { background: var(--red) !important; color: #fff; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id='data-loader' style='padding:20px;background:var(--s2);text-align:center;'>
    <label style='background:var(--accent);color:#fff;padding:10px 20px;border-radius:var(--r);cursor:pointer;'>
      JSONファイルを選択
      <input type='file' accept='.json' onchange='loadData(event)' style='display:none;'>
    </label>
  </div>

  <header>
    <div class='logo'>LEAP <em>単語帳</em></div>
    <div class='hstats'>
      <div class='hstat'><strong id='h-range'>0</strong>範囲</div>
      <div class='hstat'><strong id='h-done'>0</strong>完了</div>
      <div class='hstat'><strong id='h-ok'>0</strong>正解</div>
    </div>
  </header>

  <div class='tabs'>
    <div class='tab active' onclick='switchTab(`flash`)'>📇 フラッシュ</div>
    <div class='tab' onclick='switchTab(`quiz`)'>🎯 クイズ</div>
    <div class='tab' onclick='switchTab(`list`)'>📋 一覧</div>
    <div class='tab' onclick='switchTab(`weak`)'>⚠️ 苦手</div>
  </div>

  <main>
    <div id='pane-flash'>
      <div class='toolbar'>
        <div class='range-row'>
          No.<input type='number' id='f-from' class='tbinput' value='1'>〜<input type='number' id='f-to' class='tbinput' value='100'>
          <button class='btn-go' onclick='applyRangeByButton()'>適用</button>
        </div>
        <button class='tbbtn' id='shuf-btn' onclick='toggleShuffle()'>シャッフル</button>
      </div>
      <div class='pgwrap'>
        <div class='pginfo'><span id='f-prog'>0 / 0</span><span style='margin-left:auto; color:var(--green);'>セッション正解: <span id='f-accuracy'>0</span>%</span><span id='f-pct' style="margin-left:10px;">0%</span></div>
        <div class='pgbar'><div class='pgfill' id='f-fill' style='width:0%'></div></div>
      </div>
      <div class='card-scene' onclick='flipCard()'>
        <div class='card-inner' id='card-inner'>
          <div class='face face-front'><div id='f-num' style="font-size:0.8rem;color:var(--muted)">—</div><div class='face-word' id='f-word'>—</div></div>
          <div class='face face-back'><div id='b-num' style="font-size:0.8rem;color:var(--muted)">—</div><div class='face-eng' id='b-eng'>—</div><div id='b-meaning' style='font-size:1.1rem;'>—</div></div>
        </div>
      </div>
      <div class='btnrow'><button class='btn btn-ok' onclick='vote(true)'>✓ 覚えた</button><button class='btn' onclick='flipCard()'>↺ 回転</button><button class='btn btn-ng' onclick='vote(false)'>✗ 苦手</button></div>
      <div class='btnrow'><button class='btn' onclick='go(-1)'>← 前へ</button><button class='btn' onclick='go(1)'>次へ →</button></div>
    </div>

    <div id='pane-quiz' class='hidden'>
      <div class='toolbar'>
        No.<input type='number' id='q-from' class='tbinput' value='1'>〜<input type='number' id='q-to' class='tbinput' value='100'>
        <button class='btn-go' onclick='applyQuizRangeByButton()'>開始</button>
      </div>
      <div class='qcard'><div class='qword' id='q-word'>—</div></div>
      <div class='opts' id='q-opts'></div>
    </div>

    <div id='pane-list' class='hidden'><div id='wlist'></div></div>
    <div id='pane-weak' class='hidden'><div id='weak-list'></div></div>
  </main>

  <script>
    let ALL = [], deck = [], qDeck = [], idx = 0, qIdx = 0, shuffled = false, isAnimating = false;
    let weakSet = new Set(JSON.parse(localStorage.getItem('leap_weak') || '[]'));
    let okSet = new Set(JSON.parse(localStorage.getItem('leap_ok') || '[]'));
    let sessionOk = 0, sessionNg = 0;

    function saveProgress() {
      localStorage.setItem('leap_current_idx', idx);
      localStorage.setItem('leap_q_idx', qIdx);
      localStorage.setItem('leap_range_from', document.getElementById('f-from').value);
      localStorage.setItem('leap_range_to', document.getElementById('f-to').value);
      localStorage.setItem('leap_shuffled', shuffled);
      localStorage.setItem('leap_current_deck', JSON.stringify(deck.map(w => w.id)));
      localStorage.setItem('leap_q_deck', JSON.stringify(qDeck.map(w => w.id)));
    }

    function loadData(event) {
      const reader = new FileReader();
      reader.onload = (e) => {
        ALL = JSON.parse(e.target.result);
        document.getElementById('data-loader').style.display = 'none';

        shuffled = localStorage.getItem('leap_shuffled') === 'true';
        document.getElementById('f-from').value = document.getElementById('q-from').value = localStorage.getItem('leap_range_from') || 1;
        document.getElementById('f-to').value = document.getElementById('q-to').value = localStorage.getItem('leap_range_to') || 100;
        updateShuffleBtnUI();

        const savedDeckIds = JSON.parse(localStorage.getItem('leap_current_deck') || '[]');
        const savedQDeckIds = JSON.parse(localStorage.getItem('leap_q_deck') || '[]');
        
        if (savedDeckIds.length > 0) {
          deck = savedDeckIds.map(id => ALL.find(w => w.id === id)).filter(Boolean);
          idx = parseInt(localStorage.getItem('leap_current_idx') || '0');
        } else {
          applyRange(0);
        }

        if (savedQDeckIds.length > 0) {
          qDeck = savedQDeckIds.map(id => ALL.find(w => w.id === id)).filter(Boolean);
          qIdx = parseInt(localStorage.getItem('leap_q_idx') || '0');
        }

        updateCard();
        updateHdr();
      };
      reader.readAsText(event.target.files[0]);
    }

    function applyRange(startIdx = 0) {
      const f = parseInt(document.getElementById('f-from').value);
      const t = parseInt(document.getElementById('f-to').value);
      deck = ALL.filter(w => w.id >= f && w.id <= t);
      if (shuffled) shuffle(deck);
      idx = startIdx;
      updateCard();
    }

    function applyRangeByButton() { applyRange(0); sessionOk = 0; sessionNg = 0; updateAccuracy(); }

    function applyQuizRangeByButton() {
      const f = parseInt(document.getElementById('q-from').value);
      const t = parseInt(document.getElementById('q-to').value);
      qDeck = ALL.filter(w => w.id >= f && w.id <= t);
      shuffle(qDeck);
      qIdx = 0;
      nextQuestion();
    }

    function nextQuestion() {
      if (!qDeck.length || qIdx >= qDeck.length) { alert('クイズ終了！'); return; }
      const correct = qDeck[qIdx];
      const choices = shuffle([correct, ...shuffle([...ALL.filter(w => w.id !== correct.id)]).slice(0, 3)]);
      document.getElementById('q-word').textContent = correct.w;
      speak(correct.w);
      const optContainer = document.getElementById('q-opts');
      optContainer.innerHTML = '';
      choices.forEach(c => {
        const div = document.createElement('div');
        div.className = 'opt'; div.textContent = c.m;
        div.onclick = () => {
          if (div.classList.contains('correct') || div.classList.contains('wrong')) return;
          if (c.id === correct.id) {
            div.classList.add('correct'); okSet.add(correct.id); weakSet.delete(correct.id);
            saveStatus(); saveProgress(); setTimeout(() => { qIdx++; nextQuestion(); }, 600);
          } else {
            div.classList.add('wrong'); weakSet.add(correct.id); okSet.delete(correct.id); saveStatus();
          }
        };
        optContainer.appendChild(div);
      });
      saveProgress();
    }

    function updateCard() {
      if (!deck.length) return;
      const w = deck[idx];
      document.getElementById('f-num').textContent = document.getElementById('b-num').textContent = 'No. ' + w.id;
      document.getElementById('f-word').textContent = document.getElementById('b-eng').textContent = w.w;
      document.getElementById('b-meaning').textContent = w.m;
      document.getElementById('f-prog').textContent = (idx + 1) + ' / ' + deck.length;
      document.getElementById('f-fill').style.width = ((idx + 1) / deck.length * 100) + '%';
      document.getElementById('f-pct').textContent = Math.round((idx + 1) / deck.length * 100) + '%';
      saveProgress();
      speak(w.w);
    }

    function vote(ok) {
      if (isAnimating || !deck.length) return;
      isAnimating = true;
      const w = deck[idx];
      if (ok) { okSet.add(w.id); weakSet.delete(w.id); sessionOk++; }
      else { weakSet.add(w.id); okSet.delete(w.id); sessionNg++; }
      saveStatus(); updateAccuracy();
      const inner = document.getElementById('card-inner');
      if (!inner.classList.contains('flip')) inner.classList.add('flip');
      setTimeout(() => {
        inner.classList.remove('flip');
        setTimeout(() => { idx = (idx + 1) % deck.length; updateCard(); isAnimating = false; }, 350);
      }, 800);
    }

    function toggleShuffle() { shuffled = !shuffled; updateShuffleBtnUI(); applyRange(0); }
    function updateShuffleBtnUI() { const btn = document.getElementById('shuf-btn'); btn.style.background = shuffled ? 'var(--accent)' : 'var(--s2)'; btn.style.color = shuffled ? '#fff' : 'var(--muted)'; }
    function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
    function updateAccuracy() { const total = sessionOk + sessionNg; document.getElementById('f-accuracy').textContent = total === 0 ? 0 : Math.round((sessionOk / total) * 100); }
    function go(d) { if(!isAnimating) { idx = (idx + d + deck.length) % deck.length; updateCard(); } }
    function flipCard() { if(!isAnimating) document.getElementById('card-inner').classList.toggle('flip'); }
    function saveStatus() { localStorage.setItem('leap_weak', JSON.stringify([...weakSet])); localStorage.setItem('leap_ok', JSON.stringify([...okSet])); updateHdr(); }
    function updateHdr() { document.getElementById('h-range').textContent = deck.length; document.getElementById('h-done').textContent = okSet.size + weakSet.size; document.getElementById('h-ok').textContent = okSet.size; }
    function switchTab(t) { 
      ['flash', 'quiz', 'list', 'weak'].forEach(x => {
        const p = document.getElementById('pane-' + x);
        if(p) p.classList.toggle('hidden', x !== t);
        document.querySelectorAll('.tab').forEach(tab => {
          if(tab.textContent.includes(x === 'flash' ? 'フラッシュ' : x === 'quiz' ? 'クイズ' : x === 'list' ? '一覧' : '苦手')) tab.classList.toggle('active', x === t);
        });
      });
      if(t === 'quiz' && qDeck.length > 0) nextQuestion();
    }
    function speak(t) { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; speechSynthesis.speak(u); }
  </script>
</body>
</html>
